version: "1.0.0"
id: long-draft
name: Long Draft Mode
kind: prebuilt
description: Write a substantial draft before AI feedback unlocks.
inputs:
  - problem
variables:
  draft: null
  feedback: null
  finalAnswer: null
steps:
  - id: draft
    actor: learner
    activity: write
    instruction: Write a full draft attempt at the task. Your answer should be substantial and show your reasoning before AI feedback appears.
    validation:
      minCharacters: 150
    output: draft
  - id: feedback
    actor: ai
    activity: feedback
    skill: draft_feedback
    inputs:
      draft: "{{vars.draft}}"
      problem: "{{inputs.problem}}"
    output: feedback
  - id: answer
    actor: ai
    activity: generate
    skill: final_answer
    enabled: true
    inputs:
      draft: "{{vars.draft}}"
      problem: "{{inputs.problem}}"
    output: finalAnswer
outputs:
  answer: "{{vars.finalAnswer}}"
