defaults:
  reaskEnabled: true
  reaskLimit: 3

presets:
  - version: "1.0.0"
    id: feynman
    name: Feynman Technique
    kind: prebuilt
    description: Explain it in your own words first. AI points out the gaps.
    inputs:
      - problem
    variables:
      explanation: null
      feedback: null
      finalAnswer: null
    steps:
      - id: explain
        actor: learner
        activity: write
        instruction: Explain the task in your own words, as if teaching someone new to it.
        validation:
          minCharacters: 120
        output: explanation
      - id: feedback
        actor: ai
        activity: feedback
        skill: gap_feedback
        inputs:
          problem: "{{inputs.problem}}"
          explanation: "{{vars.explanation}}"
        output: feedback
      - id: answer
        actor: ai
        activity: generate
        skill: final_answer
        enabled: true
        inputs:
          problem: "{{inputs.problem}}"
          explanation: "{{vars.explanation}}"
        output: finalAnswer
    outputs:
      answer: "{{vars.finalAnswer}}"

  - version: "1.0.0"
    id: socratic
    name: Socratic Questioning
    kind: prebuilt
    description: Respond to focused questions instead of getting a direct answer.
    inputs:
      - problem
    variables:
      response: null
      question: null
    steps:
      - id: respond
        actor: learner
        activity: write
        instruction: Share your current thinking or attempt.
        validation:
          minCharacters: 40
        output: response
      - id: question
        actor: ai
        activity: feedback
        skill: socratic_question
        inputs:
          problem: "{{inputs.problem}}"
          response: "{{vars.response}}"
        output: question
    outputs:
      latestQuestion: "{{vars.question}}"

  - version: "1.0.0"
    id: freeze
    name: AI Freeze Window
    kind: prebuilt
    description: AI stays paused for a set time while you draft.
    inputs:
      - problem
    variables:
      draft: null
      feedback: null
      finalAnswer: null
    steps:
      - id: draft
        actor: learner
        activity: write
        instruction: Start drafting your own attempt.
        validation:
          minCharacters: 1
        output: draft
      - id: freeze
        actor: system
        activity: timer
        durationSeconds: 180
        message: Keep drafting. AI is intentionally paused.
      - id: feedback
        actor: ai
        activity: feedback
        skill: draft_feedback
        inputs:
          problem: "{{inputs.problem}}"
          draft: "{{vars.draft}}"
        output: feedback
      - id: answer
        actor: ai
        activity: generate
        skill: final_answer
        enabled: true
        inputs:
          problem: "{{inputs.problem}}"
          draft: "{{vars.draft}}"
        output: finalAnswer
    outputs:
      answer: "{{vars.finalAnswer}}"

  - version: "1.0.0"
    id: long-draft
    name: Long Draft Mode
    kind: prebuilt
    description: Write a substantial draft before AI feedback unlocks.
    inputs:
      - problem
    variables:
      draft: null
      feedback: null
      finalAnswer: null
    steps:
      - id: draft
        actor: learner
        activity: write
        instruction: Write a full draft attempt at the task.
        validation:
          minCharacters: 600
        output: draft
      - id: feedback
        actor: ai
        activity: feedback
        skill: draft_feedback
        inputs:
          draft: "{{vars.draft}}"
          problem: "{{inputs.problem}}"
        output: feedback
      - id: answer
        actor: ai
        activity: generate
        skill: final_answer
        enabled: true
        inputs:
          draft: "{{vars.draft}}"
          problem: "{{inputs.problem}}"
        output: finalAnswer
    outputs:
      answer: "{{vars.finalAnswer}}"
