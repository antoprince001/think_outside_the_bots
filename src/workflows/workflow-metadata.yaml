global:
  defaultReaskLimit: 3
  allowReask: true

activities:
  - id: write
    label: Learner response
    actor: learner
    description: Learner contributes their own attempt.
  - id: feedback
    label: Ask AI
    actor: ai
    description: AI responds with guidance.
  - id: generate
    label: Final answer
    actor: ai
    description: AI provides a worked explanation.
  - id: hint
    label: Hint
    actor: ai
    description: AI offers a small nudge.
  - id: timer
    label: Timer
    actor: system
    description: Pause the session for a set period.
  - id: decision
    label: Decision
    actor: system
    description: Branch to a different path.
  - id: display
    label: System says
    actor: system
    description: Show context or instructions.
  - id: quiz
    label: Quiz
    actor: learner
    description: Check understanding with a quick quiz.
  - id: upload
    label: Upload
    actor: learner
    description: Attach evidence or notes.
  - id: review
    label: Review
    actor: learner
    description: Review previous work.
  - id: end
    label: End
    actor: system
    description: Close the workflow.

actors:
  - id: learner
    label: Learner
  - id: ai
    label: AI
  - id: system
    label: System
  - id: teacher
    label: Teacher

skills:
  gap_feedback:
    prompt: Give concise gap feedback on the student explanation. Do not provide the final solution. If the student has already tried once, ask one short follow-up question that helps them refine the explanation without giving the answer.
    reaskPrompt: Ask one concise follow-up question that helps the learner refine the explanation without giving the answer.
  draft_feedback:
    prompt: Give concise feedback on the student draft. Do not provide a direct solution. If the learner has already tried once, ask one short follow-up question that helps them improve the draft without giving the answer.
    reaskPrompt: Ask one concise follow-up question that helps the learner improve the draft without giving the answer.
  socratic_question:
    prompt: Ask one concise Socratic follow-up question. Do not provide a direct solution. If the learner has already tried once, ask a short follow-up question that nudges them toward their own insight without revealing the answer.
    reaskPrompt: Ask a short follow-up question that nudges the learner toward their own insight without revealing the answer.
  final_answer:
    prompt: Provide a clear worked explanation. Invite the learner to compare it with their own reasoning. If the learner has already tried once, give the answer directly and keep it focused on the strongest missing concept.
    reaskPrompt: Offer a concise answer that focuses on the strongest missing concept and helps the learner close the gap.
  spaced_repetition_reinforce:
    prompt: Review the learner's first attempt and highlight the **key concepts** they need to remember. Use bold text to emphasize core ideas. Do not provide the full solution yet.
    reaskPrompt: Reinforce the key concepts again, focusing on what the learner should recall.
  spaced_repetition_verify:
    prompt: Compare the learner's second attempt with the concepts you reinforced. Affirm what they recalled correctly and gently correct any gaps.
    reaskPrompt: Verify their understanding and offer a final clarification.

builderNodeTypes:
  display:
    label: System says
    actor: system
    activity: display
    icon: MessageSquare
    defaults:
      title: Set context
      text: Take a moment to think before using AI.
  write:
    label: Learner responds
    actor: learner
    activity: write
    icon: UserRound
    defaults:
      title: Learner response
      text: Write your own attempt before AI responds.
      minCharacters: 120
  feedback:
    label: Ask AI
    actor: ai
    activity: feedback
    icon: Bot
    defaults:
      title: AI feedback
      text: Give feedback on the learner response without solving it directly.
  timer:
    label: Timer
    actor: system
    activity: timer
    icon: Clock
    defaults:
      title: Wait
      text: Keep working. AI is intentionally paused.
      durationSeconds: 180
  generate:
    label: AI final answer
    actor: ai
    activity: generate
    icon: Bot
    defaults:
      title: Worked explanation
      text: Generate a final worked explanation after the learner has tried.
